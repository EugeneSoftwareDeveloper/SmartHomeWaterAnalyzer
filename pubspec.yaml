name: water_analyzer
description: "YINMIK BLE-C600 water quality analyzer"
publish_to: 'none'
version: 1.1.1+3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # BLE.
  flutter_blue_plus: ^1.32.12

  # Runtime-permissions для Android 12+.
  permission_handler: ^11.3.1

  # State management + DI.
  flutter_riverpod: ^2.6.1

  # Навигация с типобезопасными маршрутами.
  go_router: ^14.6.2

  # Локализация (intl формат + ARB-файлы).
  intl: ^0.20.2

  # Локальное хранение пар «ключ-значение».
  shared_preferences: ^2.3.3

  # Локальная БД для истории измерений.
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.27
  path_provider: ^2.1.5
  path: ^1.9.0

  # Графики истории.
  fl_chart: ^0.69.2

  # Share/Export CSV-файлов.
  share_plus: ^10.1.2

  # Local notifications.
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation.
  build_runner: ^2.4.13
  drift_dev: ^2.21.0

  # Тестирование.
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

  # Иконки и splash.
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  generate: true  # включает l10n codegen из l10n.yaml

  assets:
    - assets/icon/

# Конфигурация иконок: запусти `dart run flutter_launcher_icons` после замены PNG.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1976D2"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 24

# Splash screen: запусти `dart run flutter_native_splash:create` после установки.
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#121212"
  image: "assets/icon/splash.png"
  image_dark: "assets/icon/splash.png"
  android_12:
    color: "#FFFFFF"
    color_dark: "#121212"
    image: "assets/icon/splash.png"
    image_dark: "assets/icon/splash.png"
